<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WorkSaga</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- 1. NAVBAR -->
  <nav class="navbar">
    <div class="logo">work<span><i>Saga</i></span></div>
    <ul class="nav-links">
      <li><a href="#">How it works</a></li>
      <li><a href="#">GitHub ↗</a></li>
    </ul>
  </nav>

  <!-- 2. HERO SECTION -->
  <section class="hero">
    <p class="tag">AI-POWERED ·</p>
    <h1>Know what the <br><span class="italic">market wants.</span></h1>
    <p class="subtext">Real-time analysis of 75+ job postings weekly.</p>

    <div class="search-bar">
      <input type="text" placeholder="Frontend Developer, ML Engineer, DevOps...">
      <button>Analyze →</button>
    </div>

    <div class="chips">
      <span>Frontend Developer</span>
      <span>Backend Engineer</span>
      <span>DevOps Engineer</span>
      <span>AI Engineer</span>
      <span>Full Stack</span>
    </div>
  </section>

  <!-- 3. STATS SECTION -->
  <section class="stats">
    <div class="stat"><h2>75+</h2><p>Jobs weekly</p></div>
    <div class="stat"><h2>5</h2><p>Roles tracked</p></div>
    <div class="stat"><h2>12</h2><p>AI signals</p></div>
    <div class="stat"><h2>₹0</h2><p>Cost</p></div>
  </section>

</body>
</html>
